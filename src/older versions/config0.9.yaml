dataset: 
  images_root: "../datasets/celebamaskhq_identity_dataset/imgs" # The clean images root directory
  annotations: "../datasets/celebamaskhq_identity_dataset/annotations/celeb_anno.json"
  dataset_name: "celebamaskhq" # dataset name for creating cache directory. in ["celebamaskhq_align", "fiw_align"]
  cache_dir: "../latent_cache" # root cache directory
  attribute_path: "../datasets/celebamaskhq_identity_dataset/annotations/attributes.json" # age, gender, race for each image
  id_attribute_path: "../datasets/celebamaskhq_identity_dataset/annotations/id_attributes.json" # gender and race for each id
  target_path: "../datasets/celebamaskhq_identity_dataset/target/085807.jpg"
  test_path: "../datasets/celebamaskhq_identity_dataset/test/047073.jpg"
  auto_prompt: 1
  target_prompt: "The face of a young adult woman of white/Caucasian race in her late teens to early twenties, with fair skin and an oval face shape. She has large brown eyes with moderately thick, naturally arched dark eyebrows. Her nose is straight and proportional, with a defined bridge. Her lips are medium in fullness with a well-defined cupid’s bow. She is conventionally attractive with balanced, symmetrical facial features."
  # gender_path: "../datasets/celebamaskhq_identity_dataset_align/annotations/gender_map.json" # The path to the gender label json file
  prompt_type: "age_gender_race" # two styles: ["gender", "age_gender_race", "face"]
  # agr_path: "../datasets/celebamaskhq_identity_dataset_align/annotations/age_gender_race.json" # The path to age_gender_race json file
  train_set_size: 8 # size of trainset of each identity
  num_train_ids: 100 # number of identities to include in the datasets
  identity_start_idx: 0 # full training set consists of the identities anno["victim_ids"][identity_start_idx: identity_start_idx+num_train_ids]
  num_id_in_group: 1
  res: 512 # Input image resized resolution

diffusion:
  pretrained_diffusion_path: "stabilityai/stable-diffusion-2-base"
  diffusion_steps: 20 # Total DDIM sampling steps
  num_fixed_point_iters: 6 # 6, 10 # number of maximum fixed-point iteration in AIDI
  start_step: 15 # 15, 10 # Which DDIM step at which to start the attack
  guidance_scale: 2.5 # guidance scale of diffusion models

training:
  seed: 42
  save_dir: "../logs" # Where to save the adversarial examples, and other results
  victim_model_dir: "./assets/victim_models" # Path to definitions and checkpoints of victim models
  test_model_names: ['mobile_face', 'ir152', 'irse50', 'facenet'] # available models: ['mobile_face', 'ir152', 'irse50', 'facenet']
  surrogate_model_names: ['mobile_face', 'ir152', 'irse50'] # available models: ['mobile_face', 'ir152', 'irse50', 'facenet']
  semseg_path: "./assets/semseg/cp/79999_iter.pth" # Path to facial semantic segmentation model definition and pth
  semseg_lam: 0.0 # Hyperparameter of face facial semantics regularization. Stands for lambda, must be positive for regularization.
  parse_map_res: 1024
  # iterations: 30 # Iterations of optimizing the adv_image
  optim_algo: "pgd" # choice of optimization algorithm from ['adamw', 'adam', 'pgd']
  memory_efficient: 1 # use memory efficient gradient algo
  lr: 0.02 # 0.004 # learning rate
  use_adaptive_lr: 0 # 1 for True and 0 for False
  weight_decay: 0.0001 # weight decay for adamw
  pgd_radius: 0.8 # the radius constrain for PGD optimization
  batch_size: 1 # training batch size
  total_update_steps: 64 # 64 # total_update_steps = n_epoch * (train_set_size // batch_size)
  attack_loss_weight: 10 # 10 # attack loss weight factor
  ca_loss_is_targeted: 1 # 1 for targetd and 0 for untargeted
  cross_attn_loss_weight: 0.0 # 10000 # cross attention loss weight factor, 10000 for untargeted and 1 for targeted
  self_attn_loss_weight: 4000 # 1000 # 4000 # 2000 # 1000 # self attention loss weight factors
  pairwise_loss_weight: 0.0 # pairwise cosine distance. for transferability
  pairwise_loss_sign: 1 # 0 for negative, as in we want the embaddings to be spread out. 1 for positive, when we want the embeddings to be close together
  neighborhood_loss_weight: 0.0 # neighborhood structural similarity loss
  ca_loss_w_blur: 1 # whether to use Gaussian blur in targeted ca loss
  ca_gaussian_kernel_size: 3 # kernel size for the Gaussian blur kernel in targeted ca loss
  ca_loss_is_w_ends: 1 # whether to include the start of text and end of text tokens in the targeted ca loss calculation
  kl_3d: 0 # use 3d kl-divergence over the whole attmap, instead of per pixel
  use_mse: 1